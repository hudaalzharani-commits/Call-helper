<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CH By Rafiq</title>
    <meta name="description" content="CH By Rafiq — smart call assistant" />
    <meta name="theme-color" content="#EFE9DF" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Lora:ital,wght@0,400;1,400;1,600&family=DM+Serif+Display:ital@0;1&family=Fraunces:ital,opsz,wght@1,9..144,400;1,9..144,600&family=Libre+Baskerville:ital,wght@0,400;1,400&family=EB+Garamond:ital,wght@1,400;1,500;1,600&family=Crimson+Pro:ital,wght@1,400;1,600&family=Spectral:ital,wght@1,400;1,600&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var t = localStorage.getItem('rafiq_theme');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.classList.remove('dark');
            document.documentElement.style.colorScheme = 'light';
          }
        } catch (e) {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
