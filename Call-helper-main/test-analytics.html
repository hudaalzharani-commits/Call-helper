<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Analytics API</title>
    <style>
        * {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            margin: 0;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .error {
            background: #fee;
            border: 2px solid #fcc;
            color: #c00;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }
        .success {
            background: #efe;
            border: 2px solid #cfc;
            color: #060;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
        }
        .button-group {
            text-align: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 اختبار Analytics API</h1>
        
        <div class="card">
            <h2>الخطوة 1: تحقق من Token</h2>
            <div id="tokenStatus"></div>
            <div class="button-group">
                <button onclick="checkToken()">فحص Token</button>
            </div>
        </div>

        <div class="card">
            <h2>الخطوة 2: اختبار الإحصائيات</h2>
            <div class="button-group">
                <button onclick="testSummary()">ملخص الإحصائيات</button>
                <button onclick="testTimeSeries()">البيانات الزمنية</button>
                <button onclick="testHourly()">النشاط بالساعة</button>
                <button onclick="testDistribution()">التوزيع</button>
                <button onclick="testAll()">اختبار الكل</button>
            </div>
            <div id="results"></div>
        </div>

        <div class="card">
            <h2>الإحصائيات المباشرة</h2>
            <div id="statsDisplay"></div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';
        
        function getToken() {
            return localStorage.getItem('token');
        }

        function checkToken() {
            const token = getToken();
            const statusDiv = document.getElementById('tokenStatus');
            
            if (!token) {
                statusDiv.innerHTML = '<div class="error">❌ لا يوجد Token! قم بتسجيل الدخول أولاً على http://localhost:3000</div>';
            } else {
                statusDiv.innerHTML = `<div class="success">✅ Token موجود!<br><small>${token.substring(0, 50)}...</small></div>`;
            }
        }

        async function callAPI(endpoint) {
            const token = getToken();
            if (!token) {
                throw new Error('No token found. Please login first.');
            }

            const response = await fetch(`${API_BASE}${endpoint}`, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            return await response.json();
        }

        function displayResult(title, data, isError = false) {
            const resultsDiv = document.getElementById('results');
            const className = isError ? 'error' : 'success';
            const emoji = isError ? '❌' : '✅';
            
            resultsDiv.innerHTML = `
                <div class="${className}">
                    <h3>${emoji} ${title}</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                </div>
            ` + resultsDiv.innerHTML;
        }

        async function testSummary() {
            try {
                const data = await callAPI('/analytics/summary');
                displayResult('ملخص الإحصائيات', data);
                displayStats(data.data);
            } catch (error) {
                displayResult('خطأ في ملخص الإحصائيات', error.message, true);
            }
        }

        async function testTimeSeries() {
            try {
                const data = await callAPI('/analytics/time-series?period=7d');
                displayResult('البيانات الزمنية (آخر 7 أيام)', data);
            } catch (error) {
                displayResult('خطأ في البيانات الزمنية', error.message, true);
            }
        }

        async function testHourly() {
            try {
                const data = await callAPI('/analytics/hourly');
                displayResult('النشاط حسب الساعة', data);
            } catch (error) {
                displayResult('خطأ في النشاط بالساعة', error.message, true);
            }
        }

        async function testDistribution() {
            try {
                const data = await callAPI('/analytics/distribution');
                displayResult('توزيع الإحصائيات', data);
            } catch (error) {
                displayResult('خطأ في التوزيع', error.message, true);
            }
        }

        async function testAll() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="loading">⏳ جاري تحميل جميع الإحصائيات...</div>';
            
            await Promise.all([
                testSummary(),
                testTimeSeries(),
                testHourly(),
                testDistribution()
            ]);
        }

        function displayStats(stats) {
            const statsDiv = document.getElementById('statsDisplay');
            statsDiv.innerHTML = `
                <div class="stat-grid">
                    <div class="stat-box">
                        <div class="stat-label">إجمالي المكالمات</div>
                        <div class="stat-value">${stats.totalCalls}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">مكالمات اليوم</div>
                        <div class="stat-value">${stats.callsToday}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">المكالمات النشطة</div>
                        <div class="stat-value">${stats.activeCalls}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">المكالمات المحلولة</div>
                        <div class="stat-value">${stats.resolvedCalls}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">إجمالي المستخدمين</div>
                        <div class="stat-value">${stats.totalUsers}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">المستخدمين النشطين</div>
                        <div class="stat-value">${stats.activeUsers}</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">معدل الحل</div>
                        <div class="stat-value">${stats.resolutionRate}%</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">متوسط وقت الحل</div>
                        <div class="stat-value">${stats.avgResolutionTime}h</div>
                    </div>
                </div>
            `;
        }

        // Auto-check token on load
        window.onload = checkToken;
    </script>
</body>
</html>
